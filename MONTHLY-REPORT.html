<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monthly Reports</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f6f9;
}

.container{
display:flex;
height:100vh;
}

/* Sidebar */

.sidebar{
width:250px;
background:#1e293b;
color:white;
padding-top:20px;
}

.sidebar h2{
text-align:center;
margin-bottom:30px;
}

.sidebar ul{
list-style:none;
}

.sidebar ul li{
padding:15px 25px;
border-bottom:1px solid rgba(255,255,255,.1);
}

.sidebar ul li:hover{
background:#334155;
}

.sidebar ul li a{
color:white;
text-decoration:none;
display:block;
}

/* Main */

.main{
flex:1;
padding:20px;
overflow:auto;
}

h1{
margin-bottom:20px;
}

.filter{
margin-bottom:20px;
}

.filter input,
.filter button{
padding:10px;
font-size:15px;
margin-right:10px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:25px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.2);
text-align:center;
}

.card h2{
margin-top:10px;
color:#2196F3;
}

table{
width:100%;
border-collapse:collapse;
background:white;
box-shadow:0 2px 8px rgba(0,0,0,.2);
}

th{
background:#2196F3;
color:white;
padding:12px;
}

td{
padding:12px;
text-align:center;
border-bottom:1px solid #ddd;
}

tr:hover{
background:#f1f1f1;
}

.buttons{
margin-top:20px;
}

.buttons button{
padding:10px 18px;
border:none;
background:#2196F3;
color:white;
border-radius:5px;
cursor:pointer;
margin-right:10px;
}

.buttons button:hover{
background:#1565c0;
}

</style>
</head>

<body>

<div class="container">

<div class="sidebar">

<h2>Finance App</h2>

<ul>

<li><a href="dashboard.html">🏠 Dashboard</a></li>

<li><a href="add-income.html">💰 Add Income</a></li>

<li><a href="add-expense.html">💳 Add Expense</a></li>

<li><a href="transaction-history.html">📜 Transactions</a></li>

<li><a href="monthly-report.html">📊 Monthly Reports</a></li>

<li><a href="profile.html">👤 Profile</a></li>

<li><a href="login.html">🚪 Logout</a></li>

</ul>

</div>

<div class="main">

<h1>Monthly Financial Report</h1>

<div class="filter">

<label>Select Month:</label>

<input type="month" id="month">

<button onclick="generateReport()">
Generate Report
</button>

</div>

<div class="cards">

<div class="card">
<h3>Total Income</h3>
<h2 id="income">₹0</h2>
</div>

<div class="card">
<h3>Total Expense</h3>
<h2 id="expense">₹0</h2>
</div>

<div class="card">
<h3>Savings</h3>
<h2 id="saving">₹0</h2>
</div>

</div>

<table>

<thead>

<tr>

<th>Date</th>
<th>Type</th>
<th>Category</th>
<th>Amount</th>

</tr>

</thead>

<tbody id="reportBody">

</tbody>

</table>

<div class="buttons">

<button onclick="window.print()">
🖨 Print Report
</button>

<button onclick="downloadCSV()">
⬇ Download CSV
</button>

<button onclick="window.location.href='dashboard.html'">
🏠 Dashboard
</button>

</div>

</div>

</div>

<script>

function generateReport(){

let incomes=JSON.parse(localStorage.getItem("incomes"))||[];
let expenses=JSON.parse(localStorage.getItem("expenses"))||[];

let month=document.getElementById("month").value;

let body=document.getElementById("reportBody");

body.innerHTML="";

let totalIncome=0;
let totalExpense=0;

function match(date){

if(month=="") return true;

return date.startsWith(month);

}

incomes.forEach(item=>{

if(match(item.date)){

totalIncome+=Number(item.amount);

body.innerHTML+=`
<tr>
<td>${item.date}</td>
<td style="color:green;">Income</td>
<td>${item.category}</td>
<td>₹${item.amount}</td>
</tr>
`;

}

});

expenses.forEach(item=>{

if(match(item.date)){

totalExpense+=Number(item.amount);

body.innerHTML+=`
<tr>
<td>${item.date}</td>
<td style="color:red;">Expense</td>
<td>${item.category}</td>
<td>₹${item.amount}</td>
</tr>
`;

}

});

document.getElementById("income").innerHTML="₹"+totalIncome;
document.getElementById("expense").innerHTML="₹"+totalExpense;
document.getElementById("saving").innerHTML="₹"+(totalIncome-totalExpense);

}

function downloadCSV(){

let rows=document.querySelectorAll("table tr");

let csv=[];

rows.forEach(r=>{

let cols=r.querySelectorAll("th,td");

let data=[];

cols.forEach(c=>data.push(c.innerText));

csv.push(data.join(","));

});

let blob=new Blob([csv.join("\n")],{type:"text/csv"});

let a=document.createElement("a");

a.href=URL.createObjectURL(blob);

a.download="Monthly_Report.csv";

a.click();

}

generateReport();

</script>

</body>
</html>
