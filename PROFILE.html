<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Profile</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f6f9;
}

.container{
display:flex;
height:100vh;
}

/* Sidebar */

.sidebar{
width:250px;
background:#1e293b;
color:white;
padding-top:20px;
}

.sidebar h2{
text-align:center;
margin-bottom:30px;
}

.sidebar ul{
list-style:none;
}

.sidebar ul li{
padding:15px 25px;
border-bottom:1px solid rgba(255,255,255,.1);
}

.sidebar ul li:hover{
background:#334155;
}

.sidebar ul li a{
color:white;
text-decoration:none;
display:block;
}

/* Main */

.main{
flex:1;
padding:30px;
}

.profile-card{
background:white;
max-width:700px;
margin:auto;
padding:30px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.2);
}

.profile-card h2{
text-align:center;
margin-bottom:20px;
}

.profile-image{
display:flex;
justify-content:center;
margin-bottom:20px;
}

.profile-image img{
width:120px;
height:120px;
border-radius:50%;
border:4px solid #2196F3;
object-fit:cover;
}

.form-group{
margin-bottom:15px;
}

label{
display:block;
font-weight:bold;
margin-bottom:5px;
}

input,select{
width:100%;
padding:10px;
border:1px solid #ccc;
border-radius:5px;
font-size:15px;
}

.buttons{
margin-top:20px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

button{
padding:12px 18px;
border:none;
border-radius:5px;
cursor:pointer;
color:white;
}

.save{
background:#2196F3;
}

.edit{
background:#4CAF50;
}

.logout{
background:red;
}

button:hover{
opacity:.9;
}

</style>

</head>

<body>

<div class="container">

<div class="sidebar">

<h2>Finance App</h2>

<ul>

<li><a href="dashboard.html">🏠 Dashboard</a></li>

<li><a href="add-income.html">💰 Add Income</a></li>

<li><a href="add-expense.html">💳 Add Expense</a></li>

<li><a href="monthly-report.html">📊 Reports</a></li>

<li><a href="transaction-history.html">📜 Transactions</a></li>

<li><a href="profile.html">👤 Profile</a></li>

<li><a href="login.html">🚪 Logout</a></li>

</ul>

</div>

<div class="main">

<div class="profile-card">

<h2>User Profile</h2>

<div class="profile-image">

<img src="https://via.placeholder.com/120" id="profilePic">

</div>

<div class="form-group">
<label>Full Name</label>
<input type="text" id="name">
</div>

<div class="form-group">
<label>Email</label>
<input type="email" id="email">
</div>

<div class="form-group">
<label>Mobile Number</label>
<input type="text" id="mobile">
</div>

<div class="form-group">
<label>Occupation</label>
<input type="text" id="occupation">
</div>

<div class="form-group">
<label>Preferred Currency</label>

<select id="currency">

<option value="₹">Indian Rupee (₹)</option>
<option value="$">US Dollar ($)</option>
<option value="€">Euro (€)</option>
<option value="£">Pound (£)</option>

</select>

</div>

<div class="buttons">

<button class="edit" onclick="enableEdit()">
Edit Profile
</button>

<button class="save" onclick="saveProfile()">
Save Changes
</button>

<button class="logout" onclick="logout()">
Logout
</button>

</div>

</div>

</div>

</div>

<script>

let profile=JSON.parse(localStorage.getItem("profile"));

if(profile){

document.getElementById("name").value=profile.name||"";
document.getElementById("email").value=profile.email||"";
document.getElementById("mobile").value=profile.mobile||"";
document.getElementById("occupation").value=profile.occupation||"";
document.getElementById("currency").value=profile.currency||"₹";

}

disableEdit();

function disableEdit(){

document.querySelectorAll("input,select").forEach(el=>{
el.disabled=true;
});

}

function enableEdit(){

document.querySelectorAll("input,select").forEach(el=>{
el.disabled=false;
});

}

function saveProfile(){

const data={

name:document.getElementById("name").value,
email:document.getElementById("email").value,
mobile:document.getElementById("mobile").value,
occupation:document.getElementById("occupation").value,
currency:document.getElementById("currency").value

};

localStorage.setItem(
"profile",
JSON.stringify(data)
);

disableEdit();

alert("Profile Updated Successfully!");

}

function logout(){

if(confirm("Do you want to logout?")){

window.location.href="login.html";

}

}

</script>

</body>
</html>
