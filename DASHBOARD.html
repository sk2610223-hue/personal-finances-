<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard | Personal Finance</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f6f9;
}

.container{
display:flex;
height:100vh;
}

/* Sidebar */

.sidebar{

width:250px;
background:#1e293b;
color:white;
padding-top:20px;

}

.sidebar h2{

text-align:center;
margin-bottom:30px;

}

.sidebar ul{

list-style:none;

}

.sidebar ul li{

padding:15px 25px;
border-bottom:1px solid rgba(255,255,255,0.1);

}

.sidebar ul li:hover{

background:#334155;
cursor:pointer;

}

.sidebar ul li a{

text-decoration:none;
color:white;
display:block;

}

/* Main */

.main{

flex:1;
padding:20px;

}

.header{

display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;

}

.header h1{

color:#333;

}

.logout{

background:red;
color:white;
padding:10px 18px;
border:none;
border-radius:5px;
cursor:pointer;

}

/* Cards */

.cards{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:30px;

}

.card{

background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,.2);

}

.card h3{

margin-bottom:10px;
color:#666;

}

.card h2{

color:#2196F3;

}

/* Buttons */

.actions{

margin-bottom:30px;

}

.actions button{

padding:12px 20px;
margin-right:10px;
border:none;
border-radius:5px;
background:#2196F3;
color:white;
cursor:pointer;

}

.actions button:hover{

background:#1565c0;

}

/* Table */

table{

width:100%;
background:white;
border-collapse:collapse;
box-shadow:0 2px 8px rgba(0,0,0,.2);

}

table th{

background:#2196F3;
color:white;
padding:12px;

}

table td{

padding:12px;
text-align:center;
border-bottom:1px solid #ddd;

}

tr:hover{

background:#f1f1f1;

}

</style>

</head>

<body>

<div class="container">

<div class="sidebar">

<h2>Finance App</h2>

<ul>

<li><a href="dashboard.html">🏠 Dashboard</a></li>

<li><a href="add-income.html">💰 Add Income</a></li>

<li><a href="add-expense.html">💳 Add Expense</a></li>

<li><a href="monthly-report.html">📊 Monthly Report</a></li>

<li><a href="profile.html">👤 Profile</a></li>

<li><a href="login.html">🚪 Logout</a></li>

</ul>

</div>

<div class="main">

<div class="header">

<h1>Welcome, User 👋</h1>

<button class="logout" onclick="logout()">Logout</button>

</div>


<div class="actions">

<button onclick="window.location.href='add-income.html'">
+ Add Income
</button>

<button onclick="window.location.href='add-expense.html'">
+ Add Expense
</button>

<button onclick="window.location.href='monthly-report.html'">
    📊 Monthly Report
</button>

</div>
<h2 style="margin-bottom:10px;">Recent Transactions</h2>

<table>

<tr>

<th>Date</th>

<th>Category</th>

<th>Type</th>

<th>Amount</th>

</tr>

</table>

</div>

</div>

<script>

function logout(){

if(confirm("Do you want to logout?")){

window.location.href="login.html";

}

}

</script>

</body>

</html>
